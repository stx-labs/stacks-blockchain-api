      summary: Get principal STX balance
      tags:
        - Accounts
      description: "Get a principal's STX balance: its total and spendable (available)
        balance, any locked STX, and the projected balance from pending mempool
        transactions."
      parameters:
        - schema:
            anyOf:
              - pattern: ^[0123456789ABCDEFGHJKMNPQRSTVWXYZ]{28,41}$
                title: Stacks Address
                description: Stacks Address
                examples:
