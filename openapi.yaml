  /extended/v1/{pox}/events:
    get:
      summary: Get latest PoX events
      tags:
        - Stacking
      parameters:
        - schema:
            minimum: 0
            default: 96
            maximum: 200
            title: Limit
            type: integer
          in: query
          name: limit
          required: false
          description: Results per page
        - schema:
            minimum: 0
            default: 0
            title: Offset
            type: integer
          in: query
          name: offset
          required: false
          description: Result offset
        - schema:
            anyOf:
              - type: string
                enum:
                  - pox2
              - type: string
                enum:
                  - pox3
              - type: string
                enum:
                  - pox4
          in: path
          name: pox
          required: true
      responses:
        "200":
          description: Default Response
  /extended/v1/{pox}/tx/{tx_id}:
    get:
      summary: Get PoX events for a transaction
      tags:
        - Stacking
      parameters:
        - schema:
            anyOf:
              - type: string
                enum:
                  - pox2
              - type: string
                enum:
                  - pox3
              - type: string
                enum:
                  - pox4
          in: path
          name: pox
          required: true
        - schema:
            type: string
          in: path
          name: tx_id
          required: true
      responses:
        "200":
          description: Default Response
  /extended/v1/{pox}/stacker/{principal}:
    get:
      summary: Get events for a stacking address
      tags:
        - Stacking
      parameters:
        - schema:
            anyOf:
              - type: string
                enum:
                  - pox2
              - type: string
                enum:
                  - pox3
              - type: string
                enum:
                  - pox4
          in: path
          name: pox
          required: true
        - schema:
            anyOf:
              - pattern: ^[0123456789ABCDEFGHJKMNPQRSTVWXYZ]{28,41}
                title: STX Address
                description: STX Address
                examples:
                  - SP318Q55DEKHRXJK696033DQN5C54D9K2EE6DHRWP
                type: string
              - pattern: ^[0123456789ABCDEFGHJKMNPQRSTVWXYZ]{28,41}.[a-zA-Z]([a-zA-Z0-9]|[-_]){0,39}$
                title: Smart Contract ID
                description: Smart Contract ID
                examples:
                  - SP000000000000000000002Q6VF78.pox-3
                type: string
          in: path
          name: principal
          required: true
      responses:
        "200":
          description: Default Response
  /extended/v1/{pox}/{pool_principal}/delegations:
    get:
      operationId: get_pool_delegations
      summary: Stacking pool members
      tags:
        - Stacking
      description: Retrieves the list of stacking pool members for a given delegator
        principal.
      parameters:
        - schema:
            minimum: 0
            default: 100
            maximum: 200
            title: Limit
            type: integer
          in: query
          name: limit
          required: false
          description: Results per page
        - schema:
            minimum: 0
            default: 0
            title: Offset
            type: integer
          in: query
          name: offset
          required: false
          description: Result offset
        - schema:
            minimum: 1
            type: integer
          in: query
          name: after_block
          required: false
          description: If specified, only delegation events after the given block will be
            included
        - schema:
            minimum: 1
            type: integer
          in: query
          name: height
          required: false
        - schema:
            default: false
            type: boolean
          example: true
          in: query
          name: unanchored
          required: false
          description: Include data from unanchored (i.e. unconfirmed) microblocks
        - schema:
            anyOf:
              - type: string
                enum:
                  - pox2
              - type: string
                enum:
                  - pox3
              - type: string
                enum:
                  - pox4
          in: path
          name: pox
          required: true
        - schema:
            type: string
          example: SPSCWDV3RKV5ZRN1FQD84YE1NQFEDJ9R1F4DYQ11
          in: path
          name: pool_principal
          required: true
          description: Address principal of the stacking pool delegator
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - limit
                  - offset
                  - total
                  - results
                properties:
                  limit:
                    type: integer
                    example: 20
                  offset:
                    type: integer
                    example: 0
                  total:
                    type: integer
                    example: 1
                  results:
                    type: array
                    items:
                      type: object
                      required:
                        - stacker
                        - amount_ustx
                        - block_height
                        - tx_id
                      properties:
                        stacker:
                          description: The principal of the pool member that issued the delegation
                          type: string
                        pox_addr:
                          description: The pox-addr value specified by the stacker in the delegation
                            operation
                          type: string
                        amount_ustx:
                          description: The amount of uSTX delegated by the stacker
                          type: string
                        burn_block_unlock_height:
                          description: The optional burnchain block unlock height that the stacker may
                            have specified
                          type: integer
                        block_height:
                          description: The block height at which the stacker delegation transaction was
                            mined at
                          type: integer
                        tx_id:
                          description: The tx_id of the stacker delegation operation
                          type: string
        4XX:
          description: Default Response
          content:
            application/json:
              schema:
                title: Error Response
                additionalProperties: true
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /extended/v1/faucets/btc:
    post:
      operationId: run_faucet_btc
      summary: Add regtest BTC tokens to address
      tags:
        - Faucets
      description: >-
        Add 0.01 BTC token to the specified regtest BTC address.

                The endpoint returns the transaction ID, which you can use to view the transaction in a regtest Bitcoin block
                explorer. The tokens are delivered once the transaction has been included in a block.

                **Note:** This is a Bitcoin regtest-only endpoint. This endpoint will not work on the Bitcoin mainnet.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              anyOf:
                - type: object
                  properties:
                    address:
                      description: A valid regtest BTC address
                      examples:
                        - 2N4M94S1ZPt8HfxydXzL2P7qyzgVq7MHWts
                      type: string
                - type: "null"
      parameters:
        - schema:
            type: string
          example: 2N4M94S1ZPt8HfxydXzL2P7qyzgVq7MHWts
          in: query
          name: address
          required: false
          description: A valid regtest BTC address
        - schema:
            default: false
            type: boolean
          in: query
          name: large
          required: false
          description: Request a large amount of regtest BTC than the default
        - schema:
            default: false
            type: boolean
          in: query
          name: xlarge
          required: false
          description: Request an extra large amount of regtest BTC than the default
      responses:
        "200":
          description: POST request that initiates a transfer of tokens to a specified
            Bitcoin regtest address
          content:
            application/json:
              schema:
                title: RunFaucetResponse
                description: POST request that initiates a transfer of tokens to a specified
                  Bitcoin regtest address
                type: object
                required:
                  - success
                  - txid
                  - raw_tx
                properties:
                  success:
                    description: Indicates if the faucet call was successful
                    type: boolean
                    enum:
                      - true
                  txid:
                    description: The transaction ID for the faucet call
                    type: string
                  raw_tx:
                    description: Raw transaction in hex string representation
                    type: string
        4XX:
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - error
                properties:
                  success:
                    type: boolean
                    enum:
                      - false
                  error:
                    description: Error message
                    type: string
  /extended/v1/faucets/btc/{address}:
    get:
      operationId: get_btc_balance
      summary: Get BTC balance for address
      tags:
        - Faucets
      parameters:
        - schema:
            type: string
          example: 2N4M94S1ZPt8HfxydXzL2P7qyzgVq7MHWts
          in: path
