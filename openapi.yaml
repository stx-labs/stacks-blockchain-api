      summary: Get principal staking summary
      tags:
        - Staking
      description: "A one-call overview of a principal's staking: its pox-5
        STX-staking position (locked STX and its sBTC rewards) plus aggregate
        totals across all of its bond positions. The per-bond breakdown is
        paginated at `/principals/:principal/staking/bonds`."
      parameters:
        - schema:
            anyOf:
              - pattern: ^[0123456789ABCDEFGHJKMNPQRSTVWXYZ]{28,41}$
                title: Stacks Address
                description: Stacks Address
                examples:
                  - SP318Q55DEKHRXJK696033DQN5C54D9K2EE6DHRWP
                type: string
              - pattern: ^[0123456789ABCDEFGHJKMNPQRSTVWXYZ]{28,41}.[a-zA-Z]([a-zA-Z0-9]|[-_]){0,39}$
                title: Smart Contract ID
                description: Smart Contract ID
                examples:
                  - SP000000000000000000002Q6VF78.pox-3
                type: string
          in: path
          name: principal
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - stx
                  - bonds
                properties:
                  stx:
                    type: object
                    required:
                      - locked
                      - rewards
                    properties:
                      locked:
                        description: The amount of uSTX currently locked in pox-5 STX staking
                        type: string
                      rewards:
                        type: object
                        required:
                          - btc
                        properties:
                          btc:
                            type: object
                            required:
                              - accrued
                              - claimed
                              - claimable
                            properties:
                              accrued:
                                description: The lifetime sBTC reward sats accrued to this position
                                type: string
                              claimed:
                                description: The lifetime sBTC reward sats already claimed against this position
                                type: string
                              claimable:
                                description: The sBTC reward sats currently claimable (accrued minus claimed)
                                type: string
                  bonds:
                    type: object
                    required:
                      - count
                      - locked
                      - rewards
                    properties:
                      count:
                        description: Number of bonds this principal has a position in
                        type: integer
                      locked:
                        type: object
                        required:
                          - btc
                          - stx
                        properties:
                          btc:
                            description: Total BTC locked across all bond positions
                            type: string
                          stx:
                            description: Total STX locked across all bond positions
                            type: string
                      rewards:
                        type: object
                        required:
                          - btc
                        properties:
                          btc:
                            type: object
                            required:
                              - accrued
                              - claimed
                              - claimable
                            properties:
                              accrued:
                                description: The lifetime sBTC reward sats accrued to this position
                                type: string
                              claimed:
                                description: The lifetime sBTC reward sats already claimed against this position
