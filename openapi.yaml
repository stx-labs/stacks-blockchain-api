  /extended/v3/principals/{principal}/transactions:
    get:
      operationId: get_principal_transactions
      summary: Get principal transactions
      tags:
        - Transactions
      description: Returns a list of confirmed transactions sent or received by a
        Stacks principal, including the transaction summary, the involvement of
        the principal in the transaction, and the balances affected by the
        transaction.
      parameters:
        - schema:
            minimum: 1
            default: 20
            maximum: 50
            type: integer
          in: query
          name: limit
          required: false
          description: Number of results per page
        - schema:
            pattern: ^[0-9]+:[0-9]+:[0-9]+$
            type: string
          in: query
          name: cursor
          required: false
          description: "Cursor for paginating transactions. Format:
            block_height:microblock_sequence:tx_index"
        - schema:
            anyOf:
              - pattern: ^[0123456789ABCDEFGHJKMNPQRSTVWXYZ]{28,41}$
                title: Stacks Address
                description: Stacks Address
                examples:
                  - SP318Q55DEKHRXJK696033DQN5C54D9K2EE6DHRWP
                type: string
              - pattern: ^[0123456789ABCDEFGHJKMNPQRSTVWXYZ]{28,41}.[a-zA-Z]([a-zA-Z0-9]|[-_]){0,39}$
                title: Smart Contract ID
                description: Smart Contract ID
                examples:
                  - SP000000000000000000002Q6VF78.pox-3
                type: string
          in: path
          name: principal
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - total
                  - limit
                  - cursor
                  - results
                properties:
                  total:
                    type: integer
                    example: 1
                  limit:
                    minimum: 1
                    default: 20
                    maximum: 50
                    description: Number of results per page
                    type: integer
                  cursor:
                    type: object
                    required:
