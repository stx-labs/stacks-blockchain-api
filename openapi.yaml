  /extended/v1/microblock/:
    get:
      operationId: get_microblock_list
      summary: Get recent microblocks
      tags:
        - Microblocks
      description: >-
        Retrieves a list of microblocks.

                  If you need to actively monitor new microblocks, we highly recommend subscribing to [WebSockets or Socket.io](https://github.com/hirosystems/stacks-blockchain-api/tree/master/client) for real-time updates.
      parameters:
        - schema:
            minimum: 0
            default: 20
            maximum: 200
            title: Limit
            type: integer
          in: query
          name: limit
          required: false
          description: Max number of microblocks to fetch
        - schema:
            minimum: 0
            default: 0
            title: Offset
            type: integer
          in: query
          name: offset
          required: false
          description: Result offset
      responses:
        "200":
          description: GET request that returns microblocks
          content:
            application/json:
              schema:
                title: MicroblockListResponse
                description: GET request that returns microblocks
                type: object
                required:
                  - limit
                  - offset
                  - total
                  - results
                properties:
                  limit:
                    type: integer
                    example: 20
                  offset:
                    type: integer
                    example: 0
                  total:
                    type: integer
                    example: 1
                  results:
                    type: array
                    items:
                      title: Microblock
                      description: A microblock
                      type: object
                      required:
                        - canonical
                        - microblock_canonical
                        - microblock_hash
                        - microblock_sequence
                        - microblock_parent_hash
                        - block_height
                        - parent_block_height
                        - parent_block_hash
                        - parent_burn_block_hash
                        - parent_burn_block_time
                        - parent_burn_block_time_iso
                        - parent_burn_block_height
                        - block_hash
                        - txs
                      properties:
                        canonical:
                          description: Set to `true` if the microblock corresponds to the canonical chain
                            tip.
                          type: boolean
                        microblock_canonical:
                          description: Set to `true` if the microblock was not orphaned in a following
                            anchor block. Defaults to `true` if the following
                            anchor block has not yet been created.
                          type: boolean
                        microblock_hash:
                          description: The SHA512/256 hash of this microblock.
                          type: string
                        microblock_sequence:
                          description: A hint to describe how to order a set of microblocks. Starts at 0.
                          type: integer
                        microblock_parent_hash:
                          description: The SHA512/256 hash of the previous signed microblock in this
                            stream.
                          type: string
                        block_height:
                          description: The anchor block height that confirmed this microblock.
                          type: integer
                        parent_block_height:
                          description: The height of the anchor block that preceded this microblock.
                          type: integer
                        parent_block_hash:
                          description: The hash of the anchor block that preceded this microblock.
