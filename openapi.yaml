  /extended/v3/staking/bonds:
    get:
      operationId: get_bonds
      summary: Get bonds
      tags:
        - Staking
      description: Get bonds
      parameters:
        - schema:
            minimum: 1
            default: 20
            maximum: 50
            type: integer
          in: query
          name: limit
          required: false
          description: Number of results per page
        - schema:
            pattern: ^\d+$
            type: string
          in: query
          name: cursor
          required: false
          description: "Cursor for paginating bonds. Format: bond_index"
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - total
                  - limit
                  - cursor
                  - results
                properties:
                  total:
                    type: integer
                    example: 1
                  limit:
                    minimum: 1
                    default: 20
                    maximum: 50
                    description: Number of results per page
                    type: integer
                  cursor:
                    type: object
                    required:
                      - next
                      - previous
                      - current
                    properties:
                      next:
                        anyOf:
                          - pattern: ^\d+$
                            description: "Cursor for paginating bonds. Format: bond_index"
                            type: string
                          - type: "null"
                      previous:
                        anyOf:
                          - pattern: ^\d+$
                            description: "Cursor for paginating bonds. Format: bond_index"
                            type: string
                          - type: "null"
                      current:
                        anyOf:
                          - pattern: ^\d+$
                            description: "Cursor for paginating bonds. Format: bond_index"
                            type: string
                          - type: "null"
                  results:
                    type: array
                    items:
                      type: object
                      required:
                        - index
                        - pox_version
                        - status
                        - parameters
                        - registrations
                        - schedule
                        - balances
                      properties:
                        index:
                          description: The index of the bond in the PoX-5 bond list
                          type: integer
                        pox_version:
                          type: string
                          enum:
                            - pox5
                        status:
                          anyOf:
                            - type: string
                              enum:
                                - upcoming
                            - type: string
                              enum:
                                - active
                            - type: string
                              enum:
                                - unlocked
                        parameters:
                          type: object
                          required:
                            - target_rate_bps
                            - stx_value_ratio
                            - minimum_stx_ratio
                            - btc_capacity
                          properties:
                            target_rate_bps:
                              description: The target yield rate (APY) in basis points
                              type: integer
                            stx_value_ratio:
                              description: This is a representation of the STXBTC price. The value represents
                                "uSTX per 100 sats"
                              type: integer
                            minimum_stx_ratio:
                              description: The amount of STX that must be locked relative to BTC, in
                                equal-valued terms (ie in USD terms). This value
                                is represented in basis points.
                              type: integer
                            btc_capacity:
                              description: The total capacity of BTC that can be locked up for this bond
                              type: string
                        registrations:
                          type: object
                          required:
                            - allowed_count
                            - registered_count
                          properties:
                            allowed_count:
                              description: The number of entries in the allowlist for this bond
                              type: integer
                            registered_count:
                              description: The number of registrations for this bond
                              type: integer
                        schedule:
                          type: object
                          required:
                            - activation
                            - unlock
                          properties:
                            activation:
                              type: object
                              required:
                                - bitcoin_height
                                - pox_cycle
                              properties:
                                bitcoin_height:
                                  description: The height at which the bond was activated
                                  type: integer
                                pox_cycle:
                                  description: The POX cycle at which the bond was activated
                                  type: integer
                            unlock:
                              type: object
                              required:
                                - bitcoin_height
                                - pox_cycle
                              properties:
                                bitcoin_height:
                                  description: The height at which the bond can be unlocked
                                  type: integer
                                pox_cycle:
                                  description: The POX cycle at which the bond can be unlocked
                                  type: integer
                        balances:
                          type: object
                          required:
                            - locked
                            - paid_out
                          properties:
                            locked:
                              type: object
                              required:
                                - btc
                                - stx
                              properties:
                                btc:
                                  description: The total amount of BTC that is locked up for this bond
                                  type: string
                                stx:
                                  description: The total amount of STX that is locked up for this bond
                                  type: string
                            paid_out:
                              type: object
                              required:
                                - btc
                              properties:
                                btc:
                                  description: The total amount of BTC that has been paid out for this bond
                                  type: string
        4XX:
          description: Default Response
          content:
            application/json:
              schema:
                title: Error Response
                additionalProperties: true
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                  message:
                    type: string
