                                    - nonce
                                    - fee_rate
                                    - sender_address
                                    - sponsored
                                    - post_condition_mode
                                    - post_conditions
                                    - anchor_mode
                                    - block_hash
                                    - block_height
                                    - block_time
                                    - block_time_iso
                                    - burn_block_time
                                    - burn_block_height
                                    - burn_block_time_iso
                                    - parent_burn_block_time
                                    - parent_burn_block_time_iso
                                    - canonical
                                    - tx_index
                                    - tx_status
                                    - tx_result
                                    - event_count
                                    - parent_block_hash
                                    - is_unanchored
                                    - microblock_hash
                                    - microblock_sequence
                                    - microblock_canonical
                                    - execution_cost_read_count
                                    - execution_cost_read_length
                                    - execution_cost_runtime
                                    - execution_cost_write_count
                                    - execution_cost_write_length
                                    - vm_error
                                    - events
                                    - tx_type
                                    - token_transfer
