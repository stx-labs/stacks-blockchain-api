                                - type: string
                                  enum:
                                    - dropped_too_expensive
                                - type: string
                                  enum:
                                    - dropped_stale_garbage_collect
                                - type: string
                                  enum:
                                    - dropped_problematic
                            type:
                              type: string
                              enum:
                                - token_transfer
                            token_transfer:
                              type: object
                              required:
                                - recipient
                                - amount
                                - memo
                              properties:
                                recipient:
                                  type: string
                                amount:
