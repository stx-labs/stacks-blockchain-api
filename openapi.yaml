                type: string
              - pattern: ^[0123456789ABCDEFGHJKMNPQRSTVWXYZ]{28,41}.[a-zA-Z]([a-zA-Z0-9]|[-_]){0,39}$
                title: Smart Contract ID
                description: Smart Contract ID
                examples:
                  - SP000000000000000000002Q6VF78.pox-3
                type: string
          in: path
          name: principal
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                title: PrincipalStxBalance
                type: object
                required:
                  - balance
                  - available
                  - locked
                  - mempool
                properties:
                  balance:
                    description: Total micro-STX balance (available plus locked)
                    type: string
                  available:
                    description: Spendable micro-STX balance (balance minus locked)
                    type: string
                  locked:
                    anyOf:
                      - title: StxLock
                        type: object
                        required:
                          - amount
                          - pox_version
                          - lock_tx_id
                          - stacks_lock_height
                          - burn_lock_height
                          - burn_unlock_height
                        properties:
                          amount:
                            description: The amount of locked micro-STX
                            type: string
                          pox_version:
                            description: The PoX contract version that created the lock (e.g. 4, 5)
                            type: integer
                          lock_tx_id:
                            pattern: ^(0x)?[a-fA-F0-9]{64}$
                            title: Transaction ID
                            description: Transaction ID
                            examples:
                              - "0xf6bd5f4a7b26184a3466340b2e99fd003b4962c0e382\
                                a7e4b6a13df3dd7a91c6"
                            type: string
                          stacks_lock_height:
                            description: The Stacks block height at which the lock was created
                            type: integer
                          burn_lock_height:
                            description: The burnchain block height at which the lock was created
                            type: integer
                          burn_unlock_height:
                            description: The burnchain block height at which the locked STX unlocks
                            type: integer
                      - type: "null"
                  mempool:
                    anyOf:
                      - title: StxMempoolBalance
                        type: object
                        required:
                          - estimated_balance
                          - inbound
                          - outbound
                        properties:
                          estimated_balance:
                            description: Estimated spendable micro-STX balance once pending mempool txs
                              confirm
                            type: string
                          inbound:
                            description: Pending inbound micro-STX from the mempool
                            type: string
                          outbound:
                            description: Pending outbound micro-STX from the mempool (transfers plus fees)
                            type: string
                      - type: "null"
        4XX:
          description: Default Response
          content:
            application/json:
              schema:
                title: Error Response
                additionalProperties: true
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                  message:
                    type: string
