                properties:
                  limit:
                    type: integer
                    example: 20
                  offset:
                    type: integer
                    example: 0
                  total:
                    type: integer
                    example: 1
                  results:
                    type: array
                    items:
                      title: BurnchainRewardSlotHolder
                      description: Reward slot holder on the burnchain
                      type: object
                      required:
