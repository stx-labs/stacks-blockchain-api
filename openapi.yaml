                    type: object
                    required:
                      - next
                      - previous
                      - current
                    properties:
                      next:
                        anyOf:
                          - description: "Cursor for paginating transactions. Format:
                              block_height:microblock_sequence:tx_index"
                            pattern: ^[0-9]+:[0-9]+:[0-9]+$
                            type: string
                          - type: "null"
                      previous:
                        anyOf:
                          - description: "Cursor for paginating transactions. Format:
                              block_height:microblock_sequence:tx_index"
                            pattern: ^[0-9]+:[0-9]+:[0-9]+$
                            type: string
                          - type: "null"
                      current:
                        anyOf:
                          - description: "Cursor for paginating transactions. Format:
                              block_height:microblock_sequence:tx_index"
                            pattern: ^[0-9]+:[0-9]+:[0-9]+$
                            type: string
