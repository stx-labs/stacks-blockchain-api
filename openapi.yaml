  /extended/v1/search/{id}:
    get:
      operationId: search_by_id
      summary: Search
      tags:
        - Search
      description: Search blocks, transactions, contracts, or accounts by hash/ID
      parameters:
        - schema:
            default: false
            type: boolean
          in: query
          name: include_metadata
          required: false
          description: This includes the detailed data for purticular hash in the response
        - schema:
            type: string
          example: "0xcf8b233f19f6c07d2dc1963302d2436efd36e9afac127bf6582824a13961c06d"
          in: path
          name: id
          required: true
          description: The hex hash string for a block or transaction, account address, or
            contract address
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - found
                  - result
                properties:
                  found:
                    type: boolean
                    enum:
                      - true
                  result:
                    anyOf:
                      - title: AddressSearchResult
                        description: Address search result
                        type: object
                        required:
                          - entity_id
                          - entity_type
                        properties:
                          entity_id:
                            description: The id used to search this query.
                            type: string
                          entity_type:
                            type: string
                            enum:
                              - standard_address
                          metadata:
                            title: AddressStxBalance
                            description: GET request that returns address balances
                            type: object
                            allOf:
                              - title: StxBalance
                                type: object
                                required:
                                  - balance
                                  - total_miner_rewards_received
                                  - lock_tx_id
                                  - locked
                                  - lock_height
                                  - burnchain_lock_height
                                  - burnchain_unlock_height
                                properties:
                                  balance:
                                    type: string
                                  estimated_balance:
                                    description: Total STX balance considering pending mempool transactions
                                    type: string
                                  pending_balance_inbound:
                                    description: Inbound STX balance from pending mempool transactions
                                    type: string
                                  pending_balance_outbound:
                                    description: Outbound STX balance from pending mempool transactions
                                    type: string
                                  total_sent:
                                    type: string
                                  total_received:
                                    type: string
                                  total_fees_sent:
                                    type: string
                                  total_miner_rewards_received:
                                    type: string
                                  lock_tx_id:
                                    description: The transaction where the lock event occurred. Empty if no tokens
                                      are locked.
                                    type: string
                                  locked:
                                    description: The amount of locked STX, as string quoted micro-STX. Zero if no
                                      tokens are locked.
                                    type: string
                                  lock_height:
                                    description: The STX chain block height of when the lock event occurred. Zero if
                                      no tokens are locked.
                                    type: integer
                                  burnchain_lock_height:
                                    description: The burnchain block height of when the lock event occurred. Zero if
                                      no tokens are locked.
                                    type: integer
                                  burnchain_unlock_height:
                                    description: The burnchain block height of when the tokens unlock. Zero if no
                                      tokens are locked.
                                    type: integer
                              - type: object
                                properties:
                                  token_offering_locked:
                                    title: AddressTokenOfferingLocked
                                    description: Token Offering Locked
                                    type: object
                                    required:
                                      - total_locked
                                      - total_unlocked
                                      - unlock_schedule
                                    properties:
                                      total_locked:
                                        description: Micro-STX amount still locked at current block height.
                                        type: string
                                      total_unlocked:
                                        description: Micro-STX amount unlocked at current block height.
                                        type: string
                                      unlock_schedule:
                                        type: array
                                        items:
                                          title: AddressUnlockSchedule
                                          description: Unlock schedule amount and block height
                                          type: object
                                          required:
                                            - amount
                                            - block_height
                                          properties:
                                            amount:
                                              description: Micro-STX amount locked at this block height.
                                              type: string
                                            block_height:
                                              type: integer
                      - title: BlockSearchResult
                        description: Block search result
                        type: object
                        required:
                          - entity_id
                          - entity_type
                          - block_data
                        properties:
                          entity_id:
                            description: The id used to search this query.
                            type: string
                          entity_type:
                            type: string
                            enum:
                              - block_hash
                          block_data:
                            type: object
                            required:
                              - canonical
                              - hash
                              - parent_block_hash
                              - burn_block_time
                              - height
                            properties:
                              canonical:
                                type: boolean
                              hash:
                                type: string
                              parent_block_hash:
                                type: string
                              burn_block_time:
                                type: integer
                              height:
                                type: integer
                          metadata:
                            title: Block
                            description: A block
                            type: object
                            required:
                              - canonical
                              - height
                              - hash
                              - block_time
                              - block_time_iso
                              - tenure_height
                              - index_block_hash
                              - parent_block_hash
                              - burn_block_time
                              - burn_block_time_iso
                              - burn_block_hash
                              - burn_block_height
                              - miner_txid
                              - execution_cost_read_count
                              - execution_cost_read_length
                              - execution_cost_runtime
                              - execution_cost_write_count
                              - execution_cost_write_length
                              - txs
                              - parent_microblock_hash
                              - parent_microblock_sequence
                              - microblocks_accepted
                              - microblocks_streamed
                              - microblock_tx_count
                            properties:
                              canonical:
                                description: Set to `true` if block corresponds to the canonical chain tip
                                type: boolean
                              height:
                                description: Height of the block
                                type: integer
                              hash:
                                description: Hash representing the block
                                type: string
                              block_time:
                                description: Unix timestamp (in seconds) indicating when this block was mined.
                                type: number
                              block_time_iso:
                                description: An ISO 8601 (YYYY-MM-DDTHH:mm:ss.sssZ) indicating when this block
                                  was mined.
                                type: string
                              tenure_height:
                                description: The tenure height (AKA coinbase height) of this block
                                type: integer
                              index_block_hash:
                                description: The only hash that can uniquely identify an anchored block or an
                                  unconfirmed state trie
                                type: string
                              parent_block_hash:
                                description: Hash of the parent block
                                type: string
                              burn_block_time:
                                description: Unix timestamp (in seconds) indicating when this block was mined.
                                type: number
                              burn_block_time_iso:
                                description: An ISO 8601 (YYYY-MM-DDTHH:mm:ss.sssZ) indicating when this block
                                  was mined.
                                type: string
                              burn_block_hash:
                                description: Hash of the anchor chain block
                                type: string
                              burn_block_height:
                                description: Height of the anchor chain block
                                type: integer
                              miner_txid:
                                description: Anchor chain transaction ID
                                type: string
                              execution_cost_read_count:
                                description: Execution cost read count.
                                type: integer
                              execution_cost_read_length:
                                description: Execution cost read length.
                                type: integer
                              execution_cost_runtime:
                                description: Execution cost runtime.
                                type: integer
                              execution_cost_write_count:
                                description: Execution cost write count.
                                type: integer
                              execution_cost_write_length:
                                description: Execution cost write length.
                                type: integer
                              txs:
                                description: List of transactions included in the block
                                type: array
                                items:
                                  description: Transaction ID
                                  type: string
                              parent_microblock_hash:
                                description: The hash of the last streamed block that precedes this block to
                                  which this block is to be appended. Not every
                                  anchored block will have a parent microblock
                                  stream. An anchored block that does not have a
                                  parent microblock stream has the parent
                                  microblock hash set to an empty string, and
                                  the parent microblock sequence number set to
                                  -1.
                                type: string
                              parent_microblock_sequence:
                                description: The hash of the last streamed block that precedes this block to
                                  which this block is to be appended. Not every
                                  anchored block will have a parent microblock
                                  stream. An anchored block that does not have a
                                  parent microblock stream has the parent
                                  microblock hash set to an empty string, and
                                  the parent microblock sequence number set to
                                  -1.
                                type: integer
                              microblocks_accepted:
                                description: List of microblocks that were accepted in this anchor block. Not
