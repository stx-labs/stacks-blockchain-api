  /v1/namespaces/{tld}/names:
    get:
      operationId: get_namespace_names
      summary: Get Namespace Names
      tags:
        - Names
      description: Retrieves a list of names within a given namespace.
      parameters:
        - schema:
            type: number
          example: 22
          in: query
          name: page
          required: false
          description: namespace values are defaulted to page 1 with 100 results. You can
            query specific page results by using the 'page' query parameter.
        - schema:
            default: false
            type: boolean
          example: true
          in: query
          name: unanchored
          required: false
          description: Include data from unanchored (i.e. unconfirmed) microblocks
        - schema:
            type: string
          example: id
          in: path
          name: tld
          required: true
          description: the namespace to fetch names from.
      responses:
        "200":
          description: Fetch a list of names from the namespace.
          content:
            application/json:
              schema:
                title: BnsGetAllNamespacesNamesResponse
                description: Fetch a list of names from the namespace.
                type: array
                items:
                  type: string
              example:
                - aldenquimby.id
                - aldeoryn.id
                - alderete.id
                - aldert.id
                - aldi.id
                - aldighieri.id
        4XX:
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
  /v1/addresses/{blockchain}/{address}:
    get:
      operationId: get_names_owned_by_address
      summary: Get Names Owned by Address
      tags:
        - Names
      description: Retrieves a list of names owned by the address provided.
      parameters:
        - schema:
            default: false
            type: boolean
          example: true
          in: query
          name: unanchored
          required: false
          description: Include data from unanchored (i.e. unconfirmed) microblocks
        - schema:
            type: string
          example: stacks
          in: path
          name: blockchain
          required: true
          description: the layer-1 blockchain for the address
        - schema:
            type: string
          example: SP2J6ZY48GV1EZ5V2V5RB9MP66SW86PYKKNRV9EJ7
          in: path
          name: address
          required: true
          description: the address to lookup
      responses:
        "200":
          description: Retrieves a list of names owned by the address provided.
          content:
            application/json:
              schema:
                title: BnsNamesOwnByAddressResponse
                description: Retrieves a list of names owned by the address provided.
                type: object
                required:
                  - names
                properties:
                  names:
                    type: array
                    items:
                      type: string
                      example: muneeb.id
        4XX:
          description: Default Response
          content:
            application/json:
              schema:
                title: Error Response
                additionalProperties: true
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /v2/prices/namespaces/{tld}:
    get:
      operationId: get_namespace_price
      summary: Get Namespace Price
      tags:
        - Names
      description: Retrieves the price of a namespace. The `amount` given will be in
        the smallest possible units of the currency.
      parameters:
        - schema:
            type: string
          example: id
          in: path
          name: tld
          required: true
          description: the namespace to fetch price for
      responses:
        "200":
          description: Fetch price for namespace.
          content:
            application/json:
              schema:
                title: BnsGetNamespacePriceResponse
                description: Fetch price for namespace.
                type: object
                required:
                  - units
                  - amount
                properties:
                  units:
                    type: string
                  amount:
                    type: string
        "400":
          description: Error
          content:
            application/json:
              schema:
                title: BnsError
                description: Error
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
        4XX:
          description: Default Response
          content:
            application/json:
              schema:
                title: Error Response
                additionalProperties: true
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /v2/prices/names/{name}:
    get:
      operationId: get_name_price
      summary: Get Name Price
      tags:
        - Names
      description: Retrieves the price of a name. The `amount` given will be in the
        smallest possible units of the currency.
      parameters:
        - schema:
            type: string
          example: muneeb.id
          in: path
          name: name
          required: true
          description: the name to query price information for
      responses:
        "200":
          description: Fetch price for name.
          content:
            application/json:
              schema:
                title: BnsGetNamePriceResponse
                description: Fetch price for name.
                type: object
                required:
                  - units
                  - amount
                properties:
                  units:
                    type: string
                  amount:
                    type: string
        "400":
          description: Error
          content:
            application/json:
              schema:
                title: BnsError
                description: Error
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
        4XX:
          description: Default Response
          content:
            application/json:
              schema:
                title: Error Response
                additionalProperties: true
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                  message:
                    type: string
servers:
  - url: https://api.hiro.so/
    description: mainnet
tags:
  - name: Accounts
    description: Read-only endpoints to obtain Stacks account details
    externalDocs:
      description: Stacks Documentation - Accounts
      url: https://docs.stacks.co/network-fundamentals/accounts
  - name: Blocks
    description: Read-only endpoints to obtain Stacks block details
  - name: Burn Blocks
    description: Read-only endpoints to obtain burn block details
  - name: Faucets
    description: Endpoints to request STX or BTC tokens (not possible on Mainnet)
  - name: Fees
    description: Read-only endpoints to obtain fee details
  - name: Info
    description: Read-only endpoints to obtain network, Proof-of-Transfer, Stacking,
      STX token, and node information
  - name: Microblocks
    description: Read-only endpoints to obtain microblocks details
    externalDocs:
      description: Stacks Documentation - Microblocks
      url: https://docs.stacks.co/understand-stacks/microblocks
  - name: Names
    description: Read-only endpoints realted to the Blockchain Naming System on Stacks
    externalDocs:
      description: Stacks Documentation - Blockchain Naming System
      url: https://docs.stacks.co/network-fundamentals/bitcoin-name-system
  - name: Non-Fungible Tokens
    description: Read-only endpoints to obtain non-fungible token details
    externalDocs:
      description: Stacks Documentation - Tokens
      url: https://docs.stacks.co/build/create-tokens
  - name: Search
    description: Read-only endpoints to search for accounts, blocks, smart
      contracts, and transactions
  - name: Smart Contracts
    description: Read-only endpoints to obtain Clarity smart contract details
    externalDocs:
      description: Stacks Documentation - Clarity Smart Contracts
      url: https://docs.stacks.co/clarity/overview
  - name: Stacking Rewards
    description: Read-only endpoints to obtain Stacking reward details
    externalDocs:
      description: Stacks Documentation - Stacking
      url: https://docs.stacks.co/block-production/stacking
  - name: Transactions
    description: Endpoints to obtain transaction details and to broadcast
      transactions to the network
    externalDocs:
      description: Hiro Documentation - Transactions
      url: https://docs.hiro.so/get-started/transactions
  - name: Mempool
    description: Endpoints to obtain Mempool information
  - name: Proof of Transfer
    description: Endpoints to get information about the Proof of Transfer consensus
      mechanism
externalDocs:
  url: https://github.com/hirosystems/stacks-blockchain-api
  description: Source Repository
