                              type: integer
                            value:
                              description: Non-Fungible Token value
                              type: object
                              required:
                                - hex
                                - repr
                              properties:
                                hex:
                                  description: Hex string representing the identifier of the Non-Fungible Token
                                  type: string
                                repr:
                                  description: Readable string of the Non-Fungible Token identifier
