  /extended/v2/blocks/:
    get:
      operationId: get_blocks
      summary: Get blocks
      tags:
        - Blocks
      description: Retrieves a list of recently mined blocks
      parameters:
        - schema:
            minimum: 0
            default: 20
            maximum: 30
            title: Limit
            type: integer
          in: query
          name: limit
          required: false
          description: Results per page
        - schema:
            default: 0
            maximum: 300
            minimum: -300
            title: Offset
            type: integer
          in: query
          name: offset
          required: false
          description: Result offset
        - schema:
            pattern: ^0x[a-fA-F0-9]{64}$
            type: string
          in: query
          name: cursor
          required: false
          description: Cursor for block pagination
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - limit
                  - offset
                  - total
                  - next_cursor
                  - prev_cursor
                  - cursor
                  - results
                properties:
                  limit:
                    type: integer
                    example: 20
                  offset:
                    type: integer
                    example: 0
                  total:
                    type: integer
                    example: 1
                  next_cursor:
                    anyOf:
                      - description: Next page cursor
                        type: string
                      - type: "null"
                  prev_cursor:
                    anyOf:
                      - description: Previous page cursor
                        type: string
                      - type: "null"
                  cursor:
                    anyOf:
                      - description: Current page cursor
                        type: string
                      - type: "null"
                  results:
                    type: array
                    items:
                      type: object
                      required:
                        - canonical
                        - height
                        - hash
                        - block_time
                        - block_time_iso
                        - tenure_height
                        - index_block_hash
                        - parent_block_hash
                        - parent_index_block_hash
                        - burn_block_time
                        - burn_block_time_iso
                        - burn_block_hash
                        - burn_block_height
                        - miner_txid
                        - tx_count
                        - execution_cost_read_count
                        - execution_cost_read_length
                        - execution_cost_runtime
                        - execution_cost_write_count
                        - execution_cost_write_length
                      properties:
                        canonical:
                          description: Set to `true` if block corresponds to the canonical chain tip
                          type: boolean
                        height:
                          description: Height of the block
                          type: integer
                        hash:
                          description: Hash representing the block
                          type: string
                        block_time:
                          description: Unix timestamp (in seconds) indicating when this block was mined.
                          type: integer
                        block_time_iso:
                          description: An ISO 8601 (YYYY-MM-DDTHH:mm:ss.sssZ) indicating when this block
                            was mined.
                          type: string
                        tenure_height:
                          description: The tenure height (AKA coinbase height) of this block
                          type: integer
                        index_block_hash:
                          description: The only hash that can uniquely identify an anchored block or an
                            unconfirmed state trie
                          type: string
                        parent_block_hash:
                          description: Hash of the parent block
                          type: string
                        parent_index_block_hash:
                          description: Index block hash of the parent block
                          type: string
                        burn_block_time:
                          description: Unix timestamp (in seconds) indicating when this block was mined.
                          type: integer
                        burn_block_time_iso:
                          description: An ISO 8601 (YYYY-MM-DDTHH:mm:ss.sssZ) indicating when this block
                            was mined.
                          type: string
                        burn_block_hash:
                          description: Hash of the anchor chain block
                          type: string
                        burn_block_height:
                          description: Height of the anchor chain block
                          type: integer
                        miner_txid:
                          description: Anchor chain transaction ID
                          type: string
                        tx_count:
                          description: Number of transactions included in the block
                          type: integer
                        execution_cost_read_count:
                          description: Execution cost read count.
                          type: integer
                        execution_cost_read_length:
                          description: Execution cost read length.
                          type: integer
                        execution_cost_runtime:
                          description: Execution cost runtime.
                          type: integer
                        execution_cost_write_count:
                          description: Execution cost write count.
                          type: integer
                        execution_cost_write_length:
