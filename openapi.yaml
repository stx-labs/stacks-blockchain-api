  /extended/v1/tokens/ft/{token}/holders:
    get:
      operationId: get_ft_holders
      summary: Fungible token holders
      tags:
        - Fungible Tokens
      description: Retrieves the list of Fungible Token holders for a given token ID.
        Specify `stx` for the `token` parameter to get the list of STX holders.
      parameters:
        - schema:
            minimum: 0
            default: 100
            maximum: 200
            title: Limit
            type: integer
          in: query
          name: limit
          required: false
          description: max number of holders to fetch
        - schema:
            minimum: 0
            default: 0
            title: Offset
            type: integer
          in: query
          name: offset
          required: false
          description: index of first holder to fetch
        - schema:
            type: string
          examples:
            stx:
              value: stx
            SP3Y2ZSH8P7D50B0VBTSX11S7XSG24M1VB9YFQA4K.token-aeusdc::aeUSDC:
              value: SP3Y2ZSH8P7D50B0VBTSX11S7XSG24M1VB9YFQA4K.token-aeusdc::aeUSDC
          in: path
          name: token
          required: true
          description: fungible token identifier
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - total_supply
                  - limit
                  - offset
                  - total
                  - results
                properties:
                  total_supply:
                    description: The total supply of the token (the sum of all balances)
                    type: string
                    example: "5817609278457"
                  limit:
                    type: integer
                    example: 20
                  offset:
                    type: integer
                    example: 0
                  total:
                    type: integer
                    example: 1
                  results:
                    type: array
                    items:
                      title: FtHolderEntry
                      type: object
                      required:
                        - address
                        - balance
                      properties:
                        address:
                          description: Principal of the token holder
                          type: string
                          example: SP3G2QZHYDZPJ2FBN2V2MB74T5ZQ6FQK2P5QJ2K6
                        balance:
                          description: The balance of the token held by the address
                          type: string
                          example: "174823763"
        4XX:
          description: Default Response
          content:
            application/json:
              schema:
                title: Error Response
                additionalProperties: true
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /extended/v1/contract/by_trait:
    get:
      operationId: get_contracts_by_trait
      summary: Get contracts by trait
      tags:
        - Smart Contracts
      description: Retrieves a list of contracts based on the following traits listed
        in JSON format -  functions, variables, maps, fungible tokens and
        non-fungible tokens
      parameters:
        - schema:
            type: string
          in: query
          name: trait_abi
          required: true
          description: JSON abi of the trait.
        - schema:
            minimum: 0
            default: 20
            maximum: 50
            title: Limit
            type: integer
          in: query
          name: limit
          required: false
          description: max number of contracts fetch
        - schema:
            minimum: 0
            default: 0
            title: Offset
            type: integer
          in: query
          name: offset
          required: false
          description: index of first contract event to fetch
      responses:
        "200":
          description: GET list of contracts
          content:
            application/json:
              schema:
                title: ContractListResponse
                description: GET list of contracts
                type: object
                required:
                  - limit
                  - offset
                  - results
                properties:
                  limit:
                    type: integer
                    example: 20
                  offset:
                    type: integer
                    example: 0
                  results:
                    type: array
                    items:
                      title: SmartContract
                      description: A Smart Contract Detail
                      type: object
                      required:
                        - tx_id
                        - canonical
                        - contract_id
                        - block_height
                        - clarity_version
                        - source_code
                        - abi
                      properties:
                        tx_id:
                          type: string
                        canonical:
                          type: boolean
                        contract_id:
                          type: string
                        block_height:
                          type: integer
                        clarity_version:
                          anyOf:
                            - type: integer
                            - type: "null"
                        source_code:
                          type: string
                        abi:
                          anyOf:
                            - type: string
                            - type: "null"
        4XX:
          description: Default Response
          content:
            application/json:
              schema:
                title: Error Response
                additionalProperties: true
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                  message:
                    type: string
