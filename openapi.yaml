                                                          enum:
                                                            - burn
                                                    sender:
                                                      type: string
                                                    recipient:
                                                      type: string
                                                    amount:
                                                      type: string
                                                    memo:
                                                      type: string
                                        - title: FungibleTokenAssetTransactionEvent
                                          type: object
                                          allOf:
                                            - title: AbstractTransactionEvent
                                              type: object
                                              required:
                                                - event_index
                                              properties:
                                                event_index:
