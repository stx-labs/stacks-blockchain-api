  /extended/v3/principals/{principal}/transactions/{tx_id}/balance-changes:
    get:
      operationId: get_principal_transaction_balance_changes
      summary: Get principal transaction balance changes
      tags:
        - Transactions
      description: Returns the balance changes for a principal's transaction
      parameters:
        - schema:
            minimum: 1
            default: 20
            maximum: 50
            type: integer
          in: query
          name: limit
          required: false
          description: Number of results per page
        - schema:
            pattern: ^[0-9]+:\S+$
            type: string
          in: query
          name: cursor
          required: false
          description: "Cursor for paginating principal transaction balance changes.
            Format: `<asset_type>:<asset_identifier>` where `asset_type` is a
            numeric tag (1=STX, 2=FT, 3=NFT) and `asset_identifier` is `<stx>`
            for STX or a fully-qualified Clarity asset id such as
            `SP000…contract-name::asset-name` for FT/NFT."
        - schema:
            anyOf:
              - pattern: ^[0123456789ABCDEFGHJKMNPQRSTVWXYZ]{28,41}$
                title: Stacks Address
                description: Stacks Address
                examples:
                  - SP318Q55DEKHRXJK696033DQN5C54D9K2EE6DHRWP
                type: string
              - pattern: ^[0123456789ABCDEFGHJKMNPQRSTVWXYZ]{28,41}.[a-zA-Z]([a-zA-Z0-9]|[-_]){0,39}$
                title: Smart Contract ID
                description: Smart Contract ID
                examples:
                  - SP000000000000000000002Q6VF78.pox-3
                type: string
          in: path
          name: principal
          required: true
        - schema:
            pattern: ^(0x)?[a-fA-F0-9]{64}$
            title: Transaction ID
            type: string
          example: "0xf6bd5f4a7b26184a3466340b2e99fd003b4962c0e382a7e4b6a13df3dd7a91c6"
          in: path
          name: tx_id
          required: true
          description: Transaction ID
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - total
                  - limit
                  - cursor
                  - results
                properties:
                  total:
                    type: integer
                    example: 1
                  limit:
                    minimum: 1
                    default: 20
                    maximum: 50
                    description: Number of results per page
                    type: integer
                  cursor:
                    type: object
                    required:
                      - next
                      - previous
                      - current
                    properties:
                      next:
                        anyOf:
                          - description: "Cursor for paginating principal transaction balance changes.
                              Format: `<asset_type>:<asset_identifier>` where
                              `asset_type` is a numeric tag (1=STX, 2=FT, 3=NFT)
                              and `asset_identifier` is `<stx>` for STX or a
                              fully-qualified Clarity asset id such as
                              `SP000…contract-name::asset-name` for FT/NFT."
                            pattern: ^[0-9]+:\S+$
                            type: string
                          - type: "null"
                      previous:
                        anyOf:
                          - description: "Cursor for paginating principal transaction balance changes.
                              Format: `<asset_type>:<asset_identifier>` where
                              `asset_type` is a numeric tag (1=STX, 2=FT, 3=NFT)
                              and `asset_identifier` is `<stx>` for STX or a
                              fully-qualified Clarity asset id such as
                              `SP000…contract-name::asset-name` for FT/NFT."
                            pattern: ^[0-9]+:\S+$
                            type: string
                          - type: "null"
                      current:
                        anyOf:
                          - description: "Cursor for paginating principal transaction balance changes.
                              Format: `<asset_type>:<asset_identifier>` where
                              `asset_type` is a numeric tag (1=STX, 2=FT, 3=NFT)
                              and `asset_identifier` is `<stx>` for STX or a
                              fully-qualified Clarity asset id such as
                              `SP000…contract-name::asset-name` for FT/NFT."
                            pattern: ^[0-9]+:\S+$
                            type: string
                          - type: "null"
                  results:
                    type: array
                    items:
                      type: object
                      required:
                        - asset
                        - balance_change
                      properties:
                        asset:
                          anyOf:
                            - type: object
                              required:
                                - type
                              properties:
                                type:
                                  type: string
                                  enum:
                                    - stx
                            - type: object
                              required:
                                - type
                                - identifier
                              properties:
                                type:
                                  description: The asset type that was affected by the balance change.
                                  anyOf:
                                    - type: string
                                      enum:
                                        - ft
                                    - type: string
                                      enum:
                                        - nft
                                identifier:
                                  description: The identifier of the asset that was affected by the balance
                                    change.
                                  type: string
                        balance_change:
                          type: object
                          required:
                            - sent
                            - received
                            - net
                          properties:
                            sent:
                              description: Amount sent by the principal
                              type: string
                            received:
                              description: Amount received by the principal
                              type: string
                            net:
                              description: Net balance change for the principal
                              type: string
        4XX:
          description: Default Response
          content:
            application/json:
              schema:
                title: Error Response
                additionalProperties: true
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                  message:
                    type: string
