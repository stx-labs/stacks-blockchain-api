                            type: integer
                      bitcoin_block:
                        type: object
                        required:
                          - height
                          - time
                        properties:
                          height:
                            description: Height of the anchor burn block.
                            type: integer
                          time:
                            description: Unix timestamp (in seconds) indicating when this block was mined.
                            type: number
