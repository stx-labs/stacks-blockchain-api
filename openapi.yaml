                    type: integer
                  cursor:
                    type: object
                    required:
                      - next
                      - previous
                      - current
                    properties:
                      next:
                        anyOf:
                          - pattern: ^\d+:(0x)?[a-fA-F0-9]{64}$
                            description: "Cursor for paginating mempool transactions. Format:
                              receipt_time:tx_id"
                            type: string
                          - type: "null"
                      previous:
                        anyOf:
                          - pattern: ^\d+:(0x)?[a-fA-F0-9]{64}$
                            description: "Cursor for paginating mempool transactions. Format:
                              receipt_time:tx_id"
                            type: string
                          - type: "null"
                      current:
                        anyOf:
                          - pattern: ^\d+:(0x)?[a-fA-F0-9]{64}$
                            description: "Cursor for paginating mempool transactions. Format:
                              receipt_time:tx_id"
                            type: string
                          - type: "null"
                  results:
                    type: array
                    items:
                      anyOf:
                        - title: TokenTransferMempoolTransactionSummary
                          description: Token transfer mempool transaction summary
                          type: object
                          required:
                            - tx_id
                            - sender
                            - sponsor
                            - fee_rate
                            - receipt_time
                            - receipt_block_height
                            - status
                            - type
                            - token_transfer
                          properties:
                            tx_id:
                              description: Transaction ID
                              type: string
                            sender:
                              type: object
                              required:
