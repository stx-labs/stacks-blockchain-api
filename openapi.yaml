  /extended/v1/tokens/nft/mints:
    get:
      operationId: get_nft_mints
      summary: Non-Fungible Token mints
      tags:
        - Non-Fungible Tokens
      description: >-
        Retrieves all mint events for a Non-Fungible Token asset class. Useful
        to determine which NFTs of a particular collection have been claimed.

                More information on Non-Fungible Tokens on the Stacks blockchain can be found [here](https://docs.stacks.co/build/create-tokens/creating-a-nft).
      parameters:
        - schema:
            type: string
          example: SP2X0TZ59D5SZ8ACQ6YMCHHNR2ZN51Z32E2CJ173.the-explorer-guild::The-Explorer-Guild
          in: query
          name: asset_identifier
          required: true
          description: asset class identifier
        - schema:
            minimum: 0
            default: 50
            maximum: 200
            title: Limit
            type: integer
          in: query
          name: limit
          required: false
          description: max number of events to fetch
        - schema:
            minimum: 0
            default: 0
            title: Offset
            type: integer
          in: query
          name: offset
          required: false
          description: index of first event to fetch
        - schema:
            default: false
            type: boolean
          example: true
          in: query
          name: unanchored
          required: false
          description: Include data from unanchored (i.e. unconfirmed) microblocks
        - schema:
            default: false
            type: boolean
          in: query
          name: tx_metadata
          required: true
          description: whether or not to include the complete transaction metadata instead
            of just `tx_id`. Enabling this option can affect performance and
            response times.
      responses:
