                  - transaction
                properties:
                  index:
                    description: The index of the bond in the PoX-5 bond list
                    type: integer
                  pox_version:
                    type: string
                    enum:
                      - pox5
                  status:
                    anyOf:
                      - type: string
                        enum:
                          - upcoming
                      - type: string
                        enum:
                          - active
                      - type: string
                        enum:
                          - unlocked
                  parameters:
                    type: object
                    required:
                      - target_rate_bps
                      - stx_value_ratio
                      - minimum_stx_ratio
                      - btc_capacity
                    properties:
                      target_rate_bps:
                        description: The target yield rate (APY) in basis points
                        type: integer
                      stx_value_ratio:
                        description: This is a representation of the STXBTC price. The value represents
                          "uSTX per 100 sats"
                        type: integer
                      minimum_stx_ratio:
                        description: The amount of STX that must be locked relative to BTC, in
                          equal-valued terms (ie in USD terms). This value is
                          represented in basis points.
                        type: integer
                      btc_capacity:
                        description: The total capacity of BTC that can be locked up for this bond
                        type: string
                  registrations:
                    type: object
                    required:
                      - allowed_count
                      - registered_count
                    properties:
                      allowed_count:
                        description: The number of entries in the allowlist for this bond
                        type: integer
                      registered_count:
                        description: The number of registrations for this bond
                        type: integer
                  schedule:
                    type: object
                    required:
                      - activation
                      - unlock
                    properties:
                      activation:
                        type: object
                        required:
                          - bitcoin_height
                          - pox_cycle
                        properties:
                          bitcoin_height:
                            description: The height at which the bond was activated
                            type: integer
                          pox_cycle:
                            description: The POX cycle at which the bond was activated
                            type: integer
                      unlock:
                        type: object
                        required:
                          - bitcoin_height
                          - pox_cycle
                        properties:
                          bitcoin_height:
                            description: The height at which the bond can be unlocked
                            type: integer
                          pox_cycle:
                            description: The POX cycle at which the bond can be unlocked
                            type: integer
                  balances:
                    type: object
                    required:
