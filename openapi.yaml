                            - tx_id
                            - sender
                            - sponsor
                            - fee_rate
                            - block
                            - bitcoin_block
                            - status
                            - type
                            - token_transfer
                          properties:
                            tx_id:
                              description: Transaction ID
                              type: string
                            sender:
                              type: object
                              required:
                                - address
                                - nonce
                              properties:
                                address:
                                  description: Address of the transaction initiator
                                  type: string
                                nonce:
                                  description: Nonce of the transaction initiator
                                  type: integer
                            sponsor:
                              anyOf:
                                - type: object
                                  required:
                                    - address
                                    - nonce
                                  properties:
                                    address:
                                      description: Address of the transaction initiator
                                      type: string
                                    nonce:
                                      description: Nonce of the transaction initiator
                                      type: integer
                                - type: "null"
                            fee_rate:
                              description: Transaction fee as Integer string (64-bit unsigned integer).
                              type: string
                            block:
                              type: object
                              required:
                                - height
                                - hash
                                - index_hash
                                - time
                                - tx_index
                              properties:
                                height:
                                  description: Height of the block this transactions was associated with
                                  type: integer
                                hash:
                                  description: Hash of the blocked this transactions was associated with
                                  type: string
                                index_hash:
                                  description: Hash of the index block this transactions was associated with
                                  type: string
                                time:
                                  description: Unix timestamp (in seconds) indicating when this block was mined.
                                  type: number
                                tx_index:
                                  description: Index of the transaction, indicating the order. Starts at `0` and
                                    increases with each transaction
                                  type: integer
                            bitcoin_block:
                              type: object
                              required:
                                - height
