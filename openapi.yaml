            anyOf:
              - type: string
                enum:
                  - latest
              - pattern: ^(0x)?[a-fA-F0-9]{64}$
                title: Block hash
                description: Block hash
                examples:
                  - "0xdaf79950c5e8bb0c620751333967cdd62297137cdaf79950c5e8bb0c\
                    62075133"
                type: string
              - title: Block height
                description: Block height
                examples:
                  - 777678
                type: integer
          in: path
          name: height_or_hash
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - total
                  - limit
                  - cursor
                  - results
