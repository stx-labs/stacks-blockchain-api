  /extended/v3/blocks/{height_or_hash}/transactions:
    get:
      operationId: get_block_transactions
      summary: Get block transactions
      tags:
        - Transactions
      description: Retrieves transactions confirmed in a single block
      parameters:
        - schema:
            minimum: 1
            default: 20
            maximum: 50
            type: integer
          in: query
          name: limit
