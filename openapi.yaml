  /extended/v3/principals/{principal}/nonces:
    get:
      operationId: get_principal_nonces
      summary: Get principal nonces
      tags:
        - Accounts
      description: Get a Stacks account's latest nonce state by inspecting its
        confirmed (anchored + microblock) transactions and the mempool,
        including the nonce to use for its next transaction. Only standard
        principals have nonces; contract principals are not valid.
      parameters:
        - schema:
            pattern: ^[0123456789ABCDEFGHJKMNPQRSTVWXYZ]{28,41}$
            title: Stacks Address
            type: string
          example: SP318Q55DEKHRXJK696033DQN5C54D9K2EE6DHRWP
          in: path
          name: principal
          required: true
          description: Stacks Address
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                title: PrincipalNonces
                type: object
                required:
                  - next_nonce
                  - last_confirmed_nonce
                  - mempool
                properties:
                  next_nonce:
                    description: The nonce to use for this principal's next transaction, derived
                      from the latest confirmed and mempool nonces. May be
                      inaccurate if the API is not fully synchronized.
                    type: integer
                  last_confirmed_nonce:
                    anyOf:
                      - description: Highest nonce among the principal's confirmed (anchored +
                          microblock) transactions, or null if none.
                        type: integer
                      - type: "null"
                  mempool:
                    title: PrincipalMempoolNonces
                    type: object
                    required:
                      - last_nonce
                      - pending_nonces
                      - missing_nonces
                    properties:
                      last_nonce:
                        anyOf:
                          - description: Highest nonce among the principal's pending mempool transactions,
                              or null if none.
                            type: integer
                          - type: "null"
                      pending_nonces:
                        description: Intermediate nonces found in the mempool between the last confirmed
                          nonce and the highest mempool nonce.
                        type: array
                        items:
                          type: integer
                      missing_nonces:
                        description: Expected intermediate nonces between the last confirmed nonce and
                          the highest mempool nonce that are absent from the
                          mempool — likely stalling transactions.
                        type: array
                        items:
                          type: integer
        4XX:
          description: Default Response
          content:
            application/json:
              schema:
                title: Error Response
                additionalProperties: true
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                  message:
                    type: string
