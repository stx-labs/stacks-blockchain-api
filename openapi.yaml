openapi: 3.0.3
info:
  title: Stacks Blockchain API
  description: Welcome to the API reference overview for the [Stacks Blockchain
    API](https://docs.hiro.so/stacks-blockchain-api). [Download Postman
    collection](https://hirosystems.github.io/stacks-blockchain-api/collection.json).
  version: 9.0.0-pox5.14
components:
  schemas: {}
paths:
  /extended:
    get:
      operationId: get_status
      summary: API status
      tags:
        - Info
      description: Retrieves the running status of the Stacks Blockchain API,
        including the server version and current chain tip information.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                title: Api Status Response
                type: object
                required:
                  - server_version
                  - status
                properties:
                  server_version:
                    description: the server version that is currently running
                    type: string
                  status:
                    description: the current server status
                    type: string
                  chain_tip:
                    anyOf:
                      - type: object
                        required:
                          - block_height
                          - block_hash
                          - index_block_hash
                          - burn_block_height
                        properties:
                          block_height:
                            description: the current block height
                            type: integer
                          block_hash:
                            description: the current block hash
                            type: string
                          index_block_hash:
                            description: the current index block hash
                            type: string
                          microblock_hash:
                            description: the current microblock hash
                            type: string
                          microblock_sequence:
                            description: the current microblock sequence number
                            type: integer
                          burn_block_height:
                            description: the current burn chain block height
                            type: integer
                      - type: "null"
        4XX:
          description: Default Response
          content:
            application/json:
              schema:
                title: Error Response
                additionalProperties: true
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /extended/v1/tx/multiple:
    get:
      operationId: get_tx_list_details
      summary: Get list of details for transactions
      tags:
        - Transactions
      description: Retrieves a list of transactions for a given list of transaction IDs
      parameters:
        - schema:
            type: array
            items:
              pattern: ^(0x)?[a-fA-F0-9]{64}$
              title: Transaction ID
              description: Transaction ID
              examples:
                - "0xf6bd5f4a7b26184a3466340b2e99fd003b4962c0e382a7e4b6a13df3dd\
                  7a91c6"
              type: string
          in: query
          name: tx_id
          required: true
        - schema:
            minimum: 0
            default: 20
            maximum: 100
            title: Limit
            type: integer
          in: query
          name: event_limit
          required: false
          description: Results per page
        - schema:
            minimum: 0
            default: 0
            title: Offset
            type: integer
          in: query
          name: event_offset
          required: false
          description: Result offset
        - schema:
            default: false
            type: boolean
          example: true
          in: query
          name: unanchored
          required: false
          description: Include data from unanchored (i.e. unconfirmed) microblocks
        - schema:
            default: false
            type: boolean
          examples:
            "true":
              value: true
            "false":
              value: false
          in: query
          name: exclude_function_args
          required: false
          description: Exclude function_args from contract call responses for smaller
            transaction sizes.
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
