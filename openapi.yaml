  /extended/v2/smart-contracts/status:
    get:
      operationId: get_smart_contracts_status
      summary: Get smart contracts status
      tags:
        - Smart Contracts
      description: Retrieves the deployment status of multiple smart contracts.
      parameters:
        - schema:
            anyOf:
              - type: array
                items:
                  pattern: ^[0123456789ABCDEFGHJKMNPQRSTVWXYZ]{28,41}.[a-zA-Z]([a-zA-Z0-9]|[-_]){0,39}$
                  title: Smart Contract ID
                  description: Smart Contract ID
                  examples:
                    - SP000000000000000000002Q6VF78.pox-3
                  type: string
              - pattern: ^[0123456789ABCDEFGHJKMNPQRSTVWXYZ]{28,41}.[a-zA-Z]([a-zA-Z0-9]|[-_]){0,39}$
                title: Smart Contract ID
                description: Smart Contract ID
                examples:
                  - SP000000000000000000002Q6VF78.pox-3
                type: string
          in: query
          name: contract_id
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  anyOf:
                    - type: object
                      required:
                        - found
                        - result
                      properties:
                        found:
                          type: boolean
                          enum:
                            - true
                        result:
                          type: object
                          required:
                            - status
                            - tx_id
                            - contract_id
                          properties:
                            status:
                              description: Smart contract deployment transaction status
                              type: string
                            tx_id:
                              description: Deployment transaction ID
                              type: string
                            contract_id:
                              description: Smart contract ID
                              type: string
                            block_height:
                              description: Height of the transaction confirmation block
                              type: integer
                    - type: object
                      required:
                        - found
                      properties:
                        found:
                          type: boolean
                          enum:
                            - false
        4XX:
          description: Default Response
          content:
            application/json:
              schema:
                title: Error Response
                additionalProperties: true
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /extended/v2/smart-contracts/{contract_id}/logs:
    get:
      operationId: get_smart_contract_logs
      summary: Get smart contract logs
      tags:
        - Smart Contracts
      description: Retrieves contract log events for a given smart contract.
      parameters:
        - schema:
            minimum: 0
            default: 20
            maximum: 100
            title: Limit
            type: integer
          in: query
          name: limit
          required: false
          description: Results per page
        - schema:
            default: 0
            maximum: 1000
            minimum: -1000
            title: Offset
            type: integer
          in: query
          name: offset
          required: false
          description: Result offset
        - schema:
            pattern: ^[0-9]+:[0-9]+:[0-9]+:[0-9]+$
            type: string
          in: query
          name: cursor
          required: false
          description: Cursor for transaction event pagination
            (block_height:microblock_sequence:tx_index:event_index)
        - schema:
            type: string
          example: SP000000000000000000002Q6VF78.pox-3
          in: path
          name: contract_id
          required: true
          description: Contract identifier formatted as `<contract_address>.<contract_name>`
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - limit
                  - offset
                  - total
                  - next_cursor
                  - prev_cursor
                  - cursor
                  - results
                properties:
                  limit:
                    type: integer
                    example: 20
                  offset:
                    type: integer
                    example: 0
                  total:
                    type: integer
                    example: 1
                  next_cursor:
                    anyOf:
                      - description: Next page cursor
                        type: string
                      - type: "null"
                  prev_cursor:
                    anyOf:
                      - description: Previous page cursor
                        type: string
                      - type: "null"
                  cursor:
                    anyOf:
                      - description: Current page cursor
                        type: string
                      - type: "null"
                  results:
                    type: array
                    items:
                      title: SmartContractLogTransactionEvent
                      description: Only present in `smart_contract` and `contract_call` tx types.
                      type: object
                      allOf:
                        - title: AbstractTransactionEvent
                          type: object
                          required:
                            - event_index
                          properties:
                            event_index:
                              type: integer
                        - type: object
                          required:
                            - event_type
                            - tx_id
                            - contract_log
                          properties:
                            event_type:
                              type: string
                              enum:
                                - smart_contract_log
                            tx_id:
                              type: string
                            contract_log:
                              type: object
                              required:
                                - contract_id
                                - topic
                                - value
                              properties:
                                contract_id:
                                  type: string
                                topic:
                                  type: string
                                value:
                                  type: object
                                  required:
                                    - hex
                                    - repr
                                  properties:
                                    hex:
                                      type: string
                                    repr:
                                      type: string
        4XX:
          description: Default Response
          content:
            application/json:
              schema:
                title: Error Response
                additionalProperties: true
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                  message:
                    type: string
