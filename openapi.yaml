  /extended/v3/transactions/{tx_id}/events:
    get:
      operationId: get_transaction_events
      summary: Get transaction events
      tags:
        - Transactions
      description: Retrieves events for a given transaction ID
      parameters:
        - schema:
            minimum: 1
            default: 20
            maximum: 100
            type: integer
          in: query
          name: limit
          required: false
          description: Number of results per page
        - schema:
            pattern: ^[0-9]+$
            type: string
          in: query
          name: cursor
          required: false
          description: "Cursor for paginating transaction events. Format: event_index"
        - schema:
            pattern: ^(0x)?[a-fA-F0-9]{64}$
            title: Transaction ID
            type: string
          example: "0xf6bd5f4a7b26184a3466340b2e99fd003b4962c0e382a7e4b6a13df3dd7a91c6"
          in: path
          name: tx_id
          required: true
          description: Transaction ID
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - total
                  - limit
                  - cursor
                  - results
                properties:
                  total:
                    type: integer
                    example: 1
                  limit:
                    minimum: 1
                    default: 20
                    maximum: 100
                    description: Number of results per page
                    type: integer
                  cursor:
                    type: object
                    required:
                      - next
                      - previous
                      - current
                    properties:
                      next:
                        anyOf:
                          - pattern: ^[0-9]+$
                            description: "Cursor for paginating transaction events. Format: event_index"
                            type: string
                          - type: "null"
                      previous:
                        anyOf:
                          - pattern: ^[0-9]+$
                            description: "Cursor for paginating transaction events. Format: event_index"
                            type: string
                          - type: "null"
                      current:
                        anyOf:
                          - pattern: ^[0-9]+$
                            description: "Cursor for paginating transaction events. Format: event_index"
                            type: string
                          - type: "null"
                  results:
                    type: array
                    items:
                      anyOf:
                        - type: object
                          required:
                            - event_index
                            - type
                            - contract_log
                          properties:
                            event_index:
                              type: integer
                            type:
                              type: string
                              enum:
                                - contract_log
                            contract_log:
                              type: object
                              required:
                                - contract_id
                                - topic
                                - value
                              properties:
                                contract_id:
                                  pattern: ^[0123456789ABCDEFGHJKMNPQRSTVWXYZ]{28,41}.[a-zA-Z]([a-zA-Z0-9]|[-_]){0,39}$
                                  title: Smart Contract ID
                                  description: Smart Contract ID
                                  examples:
                                    - SP000000000000000000002Q6VF78.pox-3
                                  type: string
                                topic:
                                  type: string
                                  enum:
                                    - print
                                value:
                                  type: object
                                  required:
                                    - hex
                                    - repr
                                  properties:
                                    hex:
                                      type: string
                                    repr:
                                      type: string
                        - type: object
                          required:
                            - event_index
                            - type
                            - stx_lock
                          properties:
                            event_index:
                              type: integer
                            type:
                              type: string
                              enum:
                                - stx_lock
                            stx_lock:
                              type: object
                              required:
                                - amount
                                - unlock_bitcoin_height
                                - address
                              properties:
                                amount:
                                  pattern: ^[0-9]+$
                                  title: Amount
                                  description: Amount
                                  examples:
                                    - "1000000"
                                  type: string
                                unlock_bitcoin_height:
                                  title: Block height
                                  description: Block height
                                  examples:
                                    - 777678
                                  type: integer
                                address:
                                  anyOf:
                                    - pattern: ^[0123456789ABCDEFGHJKMNPQRSTVWXYZ]{28,41}$
                                      title: Stacks Address
                                      description: Stacks Address
                                      examples:
                                        - SP318Q55DEKHRXJK696033DQN5C54D9K2EE6DHRWP
                                      type: string
                                    - pattern: ^[0123456789ABCDEFGHJKMNPQRSTVWXYZ]{28,41}.[a-zA-Z]([a-zA-Z0-9]|[-_]){0,39}$
                                      title: Smart Contract ID
                                      description: Smart Contract ID
                                      examples:
                                        - SP000000000000000000002Q6VF78.pox-3
                                      type: string
                        - type: object
                          required:
                            - event_index
                            - type
                            - stx_asset
                          properties:
                            event_index:
                              type: integer
                            type:
                              type: string
                              enum:
                                - stx_asset
                            stx_asset:
