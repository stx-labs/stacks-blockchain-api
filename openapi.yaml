                                                properties:
                                                  event_index:
                                                    type: integer
                                              - type: object
                                                required:
                                                  - event_type
                                                  - tx_id
                                                  - asset
                                                properties:
                                                  event_type:
                                                    type: string
                                                    enum:
                                                      - fungible_token_asset
                                                  tx_id:
                                                    type: string
                                                  asset:
                                                    type: object
                                                    required:
                                                      - asset_event_type
                                                      - asset_id
                                                      - sender
                                                      - recipient
                                                      - amount
                                                    properties:
                                                      asset_event_type:
                                                        anyOf:
                                                          - type: string
                                                            enum:
                                                              - transfer
                                                          - type: string
                                                            enum:
                                                              - mint
                                                          - type: string
                                                            enum:
                                                              - burn
                                                      asset_id:
                                                        type: string
                                                      sender:
                                                        type: string
                                                      recipient:
                                                        type: string
                                                      amount:
                                                        type: string
                                          - title: NonFungibleTokenAssetTransactionEvent
                                            type: object
                                            allOf:
                                              - title: AbstractTransactionEvent
                                                type: object
                                                required:
