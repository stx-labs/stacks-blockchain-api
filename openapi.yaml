  /extended/v1/tx/mempool/stats:
    get:
      operationId: get_mempool_transaction_stats
      summary: Get statistics for mempool transactions
      tags:
        - Transactions
      description: >-
        Queries for transactions counts, age (by block height), fees (simple
        average), and size.
                All results broken down by transaction type and percentiles (p25, p50, p75, p95).
      responses:
        "200":
          description: GET request that returns stats on mempool transactions
          content:
            application/json:
              schema:
                title: MempoolTransactionStatsResponse
                description: GET request that returns stats on mempool transactions
                type: object
                required:
                  - tx_type_counts
                  - tx_simple_fee_averages
                  - tx_ages
                  - tx_byte_sizes
                properties:
                  tx_type_counts:
                    additionalProperties:
                      type: integer
                    description: Number of tranasction in the mempool, broken down by transaction
                      type.
                    type: object
                  tx_simple_fee_averages:
                    description: The simple mean (average) transaction fee, broken down by
                      transaction type. Note that this does not factor in actual
                      execution costs. The average fee is not a reliable metric
                      for calculating a fee for a new transaction.
                    type: object
                    additionalProperties:
                      additionalProperties: true
                      type: object
                      required:
                        - p25
                        - p50
                        - p75
                        - p95
                      properties:
                        p25:
                          anyOf:
                            - type: number
                            - type: "null"
                        p50:
                          anyOf:
                            - type: number
                            - type: "null"
                        p75:
                          anyOf:
                            - type: number
                            - type: "null"
                        p95:
                          anyOf:
                            - type: number
                            - type: "null"
                  tx_ages:
                    description: The average time (in blocks) that transactions have lived in the
                      mempool. The start block height is simply the current
                      chain-tip of when the attached Stacks node receives the
                      transaction. This timing can be different across Stacks
                      nodes / API instances due to propagation timing
                      differences in the p2p network.
                    type: object
                    additionalProperties:
                      additionalProperties: true
                      type: object
                      required:
                        - p25
                        - p50
                        - p75
                        - p95
                      properties:
                        p25:
                          anyOf:
                            - type: number
                            - type: "null"
                        p50:
                          anyOf:
                            - type: number
                            - type: "null"
                        p75:
                          anyOf:
                            - type: number
                            - type: "null"
                        p95:
                          anyOf:
                            - type: number
                            - type: "null"
                  tx_byte_sizes:
                    description: The average byte size of transactions in the mempool, broken down
                      by transaction type.
                    type: object
                    additionalProperties:
                      additionalProperties: true
                      type: object
                      required:
                        - p25
                        - p50
                        - p75
                        - p95
                      properties:
                        p25:
                          anyOf:
                            - type: number
                            - type: "null"
                        p50:
                          anyOf:
                            - type: number
                            - type: "null"
                        p75:
                          anyOf:
                            - type: number
                            - type: "null"
                        p95:
                          anyOf:
                            - type: number
                            - type: "null"
        4XX:
          description: Default Response
          content:
            application/json:
              schema:
                title: Error Response
                additionalProperties: true
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /extended/v1/stx_supply/:
    get:
      operationId: get_stx_supply
      summary: Get total and unlocked STX supply
      tags:
        - Info
      description: Retrieves the total and unlocked STX supply. More information on
        Stacking can be found [here]
        (https://docs.stacks.co/block-production/stacking).
      parameters:
        - schema:
            minimum: 0
            title: Block height
            type: integer
          example: 777678
          in: query
          name: height
          required: false
          description: Supply details are queried from specified block height. If the
            block height is not specified, the latest block height is taken as
            default value. Note that the `block height` is referred to the
            stacks blockchain.
        - schema:
            default: false
            type: boolean
          example: true
          in: query
          name: unanchored
          required: false
          description: Include data from unanchored (i.e. unconfirmed) microblocks
      responses:
        "200":
          description: GET request that returns network target block times
          content:
            application/json:
              schema:
                title: GetStxSupplyResponse
                description: GET request that returns network target block times
                type: object
                required:
                  - unlocked_percent
                  - total_stx
                  - total_stx_year_2050
                  - unlocked_stx
                  - block_height
                properties:
                  unlocked_percent:
                    description: String quoted decimal number of the percentage of STX that have
                      unlocked
                    type: string
                  total_stx:
                    description: String quoted decimal number of the total circulating number of STX
                      (at the input block height if provided, otherwise the
                      current block height)
                    type: string
                  total_stx_year_2050:
                    description: String quoted decimal number of total circulating STX supply in
                      year 2050. STX supply grows approx 0.3% annually
                      thereafter in perpetuity.
                    type: string
                  unlocked_stx:
                    description: String quoted decimal number of the STX that have been mined or
                      unlocked
                    type: string
                  block_height:
                    description: The block height at which this information was queried
                    type: integer
        4XX:
          description: Default Response
          content:
            application/json:
              schema:
                title: Error Response
                additionalProperties: true
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /extended/v1/info/network_block_times:
    get:
      operationId: get_network_block_times
      summary: Get the network target block time
      tags:
        - Info
      description: Retrieves the target block times for mainnet and testnet. The block
        time is hardcoded and will change throughout the implementation phases
        of the testnet.
      responses:
        "200":
          description: GET request that returns network target block times
          content:
            application/json:
              schema:
                title: NetworkBlockTimesResponse
                description: GET request that returns network target block times
                type: object
                required:
                  - mainnet
                  - testnet
                properties:
                  mainnet:
                    type: object
                    required:
                      - target_block_time
                    properties:
                      target_block_time:
                        type: integer
                  testnet:
                    type: object
                    required:
                      - target_block_time
                    properties:
                      target_block_time:
                        type: integer
        4XX:
          description: Default Response
          content:
            application/json:
              schema:
                title: Error Response
                additionalProperties: true
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /extended/v1/info/network_block_time/{network}:
    get:
      operationId: get_network_block_time_by_network
      summary: Get a given network's target block time
      tags:
        - Info
      description: Retrieves the target block time for a given network. The network
        can be mainnet or testnet. The block time is hardcoded and will change
        throughout the implementation phases of the testnet.
      parameters:
        - schema:
            anyOf:
              - type: string
                enum:
                  - testnet
              - type: string
                enum:
                  - mainnet
          in: path
          name: network
          required: true
      responses:
        "200":
          description: GET request that target block time for a given network
          content:
            application/json:
              schema:
                title: NetworkBlockTimeResponse
                description: GET request that target block time for a given network
                type: object
                required:
                  - target_block_time
                properties:
                  target_block_time:
                    type: integer
        4XX:
          description: Default Response
          content:
            application/json:
              schema:
                title: Error Response
                additionalProperties: true
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                  message:
                    type: string
  /extended/v1/tokens/nft/history:
    get:
      operationId: get_nft_history
      summary: Non-Fungible Token history
      tags:
        - Non-Fungible Tokens
      description: >-
        Retrieves all events relevant to a Non-Fungible Token. Useful to
        determine the ownership history of a particular asset.

                More information on Non-Fungible Tokens on the Stacks blockchain can be found [here](https://docs.stacks.co/build/create-tokens/creating-a-nft).
      parameters:
        - schema:
            type: string
          example: SP2X0TZ59D5SZ8ACQ6YMCHHNR2ZN51Z32E2CJ173.the-explorer-guild::The-Explorer-Guild
          in: query
          name: asset_identifier
          required: true
          description: asset class identifier
        - schema:
            type: string
          example: "0x0100000000000000000000000000000803"
          in: query
          name: value
          required: true
          description: hex representation of the token's unique value
        - schema:
            minimum: 0
            default: 50
            maximum: 200
            title: Limit
            type: integer
          in: query
          name: limit
          required: false
          description: max number of events to fetch
        - schema:
            minimum: 0
            default: 0
            title: Offset
            type: integer
          in: query
          name: offset
          required: false
          description: index of first event to fetch
        - schema:
            default: false
            type: boolean
          example: true
          in: query
          name: unanchored
          required: false
          description: Include data from unanchored (i.e. unconfirmed) microblocks
        - schema:
            default: false
            type: boolean
          in: query
          name: tx_metadata
          required: true
          description: whether or not to include the complete transaction metadata instead
            of just `tx_id`. Enabling this option can affect performance and
            response times.
      responses:
        "200":
          description: List of Non-Fungible Token history events
          content:
            application/json:
              schema:
                description: List of Non-Fungible Token history events
                type: object
                required:
                  - limit
                  - offset
                  - total
                  - results
                properties:
                  limit:
                    type: integer
                    example: 20
                  offset:
                    type: integer
                    example: 0
                  total:
                    type: integer
                    example: 1
                  results:
                    type: array
                    items:
                      title: NonFungibleTokenHistoryEvent
                      description: Describes an event from the history of a Non-Fungible Token
                      anyOf:
                        - title: NonFungibleTokenHistoryEventWithTxId
                          description: Non-Fungible Token history event with transaction id
                          type: object
                          required:
                            - event_index
                            - asset_event_type
                            - tx_id
                          properties:
                            sender:
                              anyOf:
                                - type: string
                                - type: "null"
                            recipient:
                              type: string
                            event_index:
                              type: integer
                            asset_event_type:
                              type: string
                            tx_id:
                              type: string
                        - title: NonFungibleTokenHistoryEventWithTxMetadata
                          description: Non-Fungible Token history event with transaction metadata
                          type: object
                          required:
                            - event_index
                            - asset_event_type
                            - tx
                          properties:
                            sender:
                              anyOf:
                                - type: string
                                - type: "null"
                            recipient:
                              type: string
                            event_index:
                              type: integer
                            asset_event_type:
                              type: string
                            tx:
                              anyOf:
                                - title: TokenTransferTransaction
                                  type: object
                                  required:
                                    - tx_id
                                    - nonce
                                    - fee_rate
                                    - sender_address
                                    - sponsored
                                    - post_condition_mode
                                    - post_conditions
                                    - anchor_mode
                                    - block_hash
                                    - block_height
                                    - block_time
                                    - block_time_iso
                                    - burn_block_time
                                    - burn_block_height
                                    - burn_block_time_iso
                                    - parent_burn_block_time
                                    - parent_burn_block_time_iso
                                    - canonical
                                    - tx_index
                                    - tx_status
                                    - tx_result
                                    - event_count
                                    - parent_block_hash
                                    - is_unanchored
                                    - microblock_hash
                                    - microblock_sequence
                                    - microblock_canonical
                                    - execution_cost_read_count
                                    - execution_cost_read_length
                                    - execution_cost_runtime
                                    - execution_cost_write_count
                                    - execution_cost_write_length
                                    - vm_error
                                    - events
                                    - tx_type
                                    - token_transfer
                                  properties:
                                    tx_id:
                                      description: Transaction ID
                                      type: string
                                    nonce:
                                      description: Used for ordering the transactions originating from and paying from
                                        an account. The nonce ensures that a
                                        transaction is processed at most once.
                                        The nonce counts the number of times an
                                        account's owner(s) have authorized a
                                        transaction. The first transaction from
                                        an account will have a nonce value equal
                                        to 0, the second will have a nonce value
                                        equal to 1, and so on.
                                      type: integer
                                    fee_rate:
                                      description: Transaction fee as Integer string (64-bit unsigned integer).
                                      type: string
                                    sender_address:
                                      description: Address of the transaction initiator
                                      type: string
                                    sponsor_nonce:
                                      type: integer
                                    sponsored:
                                      description: Denotes whether the originating account is the same as the paying
                                        account
                                      type: boolean
                                    sponsor_address:
                                      type: string
                                    post_condition_mode:
                                      anyOf:
                                        - type: string
                                          enum:
                                            - allow
                                        - type: string
                                          enum:
                                            - deny
                                        - type: string
                                          enum:
                                            - originator
                                    post_conditions:
                                      type: array
                                      items:
                                        anyOf:
                                          - type: object
                                            required:
