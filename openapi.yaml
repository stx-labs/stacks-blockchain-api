                                  type: integer
                            sponsor:
                              anyOf:
                                - type: object
                                  required:
                                    - address
                                    - nonce
                                  properties:
                                    address:
                                      description: Address of the transaction initiator
                                      type: string
                                    nonce:
                                      description: Nonce of the transaction initiator
                                      type: integer
                                - type: "null"
                            fee_rate:
                              description: Transaction fee as Integer string (64-bit unsigned integer).
                              type: string
                            receipt_time:
                              description: A unix timestamp (in seconds) indicating when the transaction
                                broadcast was received by the node.
                              type: integer
                            receipt_block_height:
                              description: Height of the block this transaction was received by the node
                              type: integer
                            status:
                              description: Status of the mempool transaction
                              anyOf:
                                - type: string
