                                    type: string
                                  microblock_sequence:
                                    description: The microblock sequence number that this transaction was streamed
                                      in. If the transaction was batched in an
                                      anchor block (not included within a
                                      microblock) then this value will be
                                      2147483647 (0x7fffffff, the max int32
                                      value), this value preserves logical
                                      transaction ordering on (block_height,
